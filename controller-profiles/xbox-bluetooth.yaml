# Xbox Controller (macOS, Bluetooth)
# Applies to Xbox One S, Series X/S connected via Bluetooth directly to macOS
# (NOT the Xbox Wireless Adapter — that uses GIP protocol over USB, not HID)
#
# BYTE LAYOUT NOTE:
# Based on research and SDL2 gamecontrollerdb, the Xbox Bluetooth HID report
# on macOS appears to use the SAME byte layout as USB HID mode for stick/trigger/button data.
# The report ID at byte 0 is still present.
#
# UNCERTAINTY: The Bluetooth report format has not been verified on real hardware.
# Use the Raw HID Debug panel at http://localhost:8080 to capture actual bytes
# and compare against this profile. If buttons/sticks don't respond, try the USB profile.
#
# KNOWN BLUETOOTH PRODUCT IDs:
#   0x02E0 — Xbox One (original) Bluetooth
#   0x0B20 — Xbox Series X/S Bluetooth
#   0x0B22 — Xbox Series X/S Bluetooth (alternate firmware)
#
# Sources: SDL2 gamecontrollerdb.txt (platform=Mac OS X entries),
#          node-hid Bluetooth path detection, community reports
# Confidence: MEDIUM — byte layout assumed same as USB; verify with hardware
name: "Xbox Controller (Bluetooth)"
connectionType: bluetooth
vendorIds:
  - 0x045E
productIds:
  - 0x02E0   # Xbox One (original) Bluetooth
  - 0x0B13   # Xbox Series X/S Bluetooth (seen on newer firmware)
  - 0x0B20   # Xbox Series X/S Bluetooth
  - 0x0B22   # Xbox Series X/S Bluetooth (alternate)
  - 0x02FD   # Xbox One S may also appear under this ID over BT on some macOS versions
  - 0x0B12   # Xbox Series X/S (may appear same PID over BT on newer firmware)

reportId:
  byte: 0

axes:
  leftStickX:   { byte: 1,  type: uint16le, range: [0, 65535] }
  leftStickY:   { byte: 3,  type: uint16le, range: [0, 65535] }
  rightStickX:  { byte: 5,  type: uint16le, range: [0, 65535] }
  rightStickY:  { byte: 7,  type: uint16le, range: [0, 65535] }
  # Verified by live HID capture + hardware behavior on Xbox Series X/S BT:
  # LT lives on byte 9, RT lives on byte 11. The bytes are non-adjacent in
  # Microsoft's HID descriptor for the Xbox over BT.
  leftTrigger:  { byte: 9,  type: uint8,   range: [0, 255] }
  rightTrigger: { byte: 11, type: uint8,   range: [0, 255] }

buttons:
  # Verified by live HID capture on Xbox Series X/S Bluetooth via macOS 14.5
  # using the in-app Raw HID Debug WS stream. Bit positions are non-contiguous
  # because the Microsoft HID descriptor leaves gaps for unused button slots.
  # Microsoft HID descriptor for Xbox over BT places face/shoulder buttons in
  # byte 14 with the unused Usage 3/6 slots as bit gaps.
  A:         { byte: 14, bit: 0 }
  B:         { byte: 14, bit: 1 }
  X:         { byte: 14, bit: 3 }
  Y:         { byte: 14, bit: 4 }
  LB:        { byte: 14, bit: 6 }
  RB:        { byte: 14, bit: 7 }
  back:      { byte: 15, bit: 2 }
  start:     { byte: 15, bit: 3 }
  LS:        { byte: 15, bit: 5 }
  RS:        { byte: 15, bit: 6 }
  # D-pad is a hat switch on byte 13. Standard 8-direction encoding:
  # 0x00 = neutral (no press), 0x01=UP, 0x03=RIGHT, 0x05=DOWN, 0x07=LEFT.
  # Verified on Xbox Series X/S Bluetooth, macOS 14.5.
  dpadUp:    { byte: 13, hatValue: 0x01 }
  dpadRight: { byte: 13, hatValue: 0x03 }
  dpadDown:  { byte: 13, hatValue: 0x05 }
  dpadLeft:  { byte: 13, hatValue: 0x07 }

# HAT SWITCH NOTE:
# Some reports suggest Xbox controllers over Bluetooth use a hat switch for the d-pad
# instead of individual bits. If d-pad input is not registering, the controller may be
# using hat switch encoding. The Raw HID Debug panel will show which byte changes when
# you press d-pad buttons. Hat switch values: up=0, upRight=1, right=2, downRight=3,
# down=4, downLeft=5, left=6, upLeft=7, center=8 (packed in lower nibble of byte 12).
