# Xbox Controller (macOS, USB HID mode)
# Tested with: Xbox One S (0x02FD), Xbox Series X/S (0x0B12)
#
# IMPORTANT: On macOS, node-hid includes the HID report ID as byte 0.
# The original profile used byte offsets 0-11 assuming no report ID byte.
# Corrected offsets add +1 for the report ID at byte 0.
#
# NOTE: Xbox controllers use GIP protocol over USB in some modes and
# standard HID in others. These offsets assume USB HID mode (not XInput).
# If your controller is not responding correctly, check if it's in XInput
# mode (Windows-style) — that has a different report format.
#
# D-pad: individual bits in byte 12 (NOT a hat switch on macOS HID mode).
# Triggers: uint8 (0-255), NOT pressure-sensitive trigger axes beyond byte range.
# Sticks: int16LE signed, full range -32768 to 32767.
#
# Sources: SDL2 gamecontrollerdb.txt, node-hid macOS behavior, xpad driver analysis
# Confidence: MEDIUM - byte offsets corrected from original; verify with real hardware.
name: "Xbox Controller"
connectionType: usb
vendorIds:
  - 0x045E
productIds:
  - 0x02FD   # Xbox One S
  - 0x0B12   # Xbox Series X/S
  - 0x028E   # Xbox 360 (legacy, may differ)
  - 0x02E0   # Xbox One Bluetooth
reportId:
  byte: 0    # node-hid includes report ID as first byte on macOS

axes:
  leftStickX:   { byte: 1,  type: int16le, range: [-32768, 32767] }
  leftStickY:   { byte: 3,  type: int16le, range: [-32768, 32767] }
  rightStickX:  { byte: 5,  type: int16le, range: [-32768, 32767] }
  rightStickY:  { byte: 7,  type: int16le, range: [-32768, 32767] }
  leftTrigger:  { byte: 9,  type: uint8,   range: [0, 255] }
  rightTrigger: { byte: 10, type: uint8,   range: [0, 255] }

buttons:
  A:         { byte: 11, bit: 0 }
  B:         { byte: 11, bit: 1 }
  X:         { byte: 11, bit: 2 }
  Y:         { byte: 11, bit: 3 }
  LB:        { byte: 11, bit: 4 }
  RB:        { byte: 11, bit: 5 }
  LS:        { byte: 11, bit: 6 }
  RS:        { byte: 11, bit: 7 }
  dpadUp:    { byte: 12, bit: 0 }
  dpadDown:  { byte: 12, bit: 1 }
  dpadLeft:  { byte: 12, bit: 2 }
  dpadRight: { byte: 12, bit: 3 }
  back:      { byte: 12, bit: 4 }
  start:     { byte: 12, bit: 5 }

# CORRECTION NOTES:
# Original profile assumed no report ID (sticks at bytes 0-7, buttons at bytes 10-11).
# Corrected to add +1 offset for the report ID byte present on macOS/node-hid.
# If the controller still doesn't respond, try the original offsets — the controller
# may be stripping the report ID in its HID descriptor.
#
# Hat switch note: original spec mentioned d-pad as a hat switch (nibble 0-8).
# Research indicates Xbox controllers in HID mode use individual bits, not a hat switch.
# The hat switch encoding is used by some generic HID gamepads but not Xbox controllers.
