# Controller button mappings - managed by FPS CamControl UI
panTilt: rightStick
zoom: leftStickY
cameraSelectLeft: leftStickLeft
cameraSelectRight: leftStickRight
takeLive: rightTrigger
autoTransition: RB
precisionMode: leftTrigger
sprintMode: LS
presetA: A
presetB: B
presetX: X
presetY: Y
presetSave: LB
speedUp: dpadUp
speedDown: dpadDown
lowerThirds: dpadLeft
emergencyStop: back
